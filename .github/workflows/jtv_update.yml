name: JTV M3U Update

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-jtv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: python jtv.py

      - name: Commit and Push
        run: |
          git config --global user.name "sportlive18"
          git config --global user.email "271363488+sportlive18@users.noreply.github.com"
          git add jtv.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of jtv.m3u" && git push)
