name: Update M3U Playlist

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:      # Allows manual trigger from the GitHub Actions tab

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit the updated file back to the repository
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script to update M3U
        run: python sayan.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sayan.m3u
          
          # Check if there are any changes to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of sayan.m3u" && git push)
